  <style>
      * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }
    html, body {
      background: linear-gradient(-45deg, #001f1f, #007BA7, #000000, #00FFFF);
      background-size: 400% 400%;
      animation: gradientFlow 10s ease infinite;
      font-family: 'Orbitron', sans-serif;
      color: #ffffff;
      overflow-x: hidden;
      scroll-behavior: smooth;
      text-align: center;
      padding: 60px 20px;
    }
    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    h1, p, .grid, footer, .back-link {
      position: relative;
      z-index: 1;
    }
    h1 {
      font-size: 3rem;
      color: #3AB09E;
      text-shadow: 0 0 12px #3AB09E, 0 0 24px #3AB09E;
      margin-bottom: 10px;
      text-transform: uppercase;
      animation: fadeInDown 1s ease-out;
    }
    p.subtitle {
      font-size: 1.1rem;
      color: #bbbbbb;
      margin-bottom: 50px;
      animation: fadeInUp 1s ease-in;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto 50px;
      animation: fadeIn 1.5s ease-in-out;
    }
    .card {
      background-color: #1a1a1aee;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 123, 167, 0.3);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      animation: slideUp 1s ease-in-out;
      border: 1px solid #3AB09E44;
    }
    .card:hover {
      transform: scale(1.05) rotateZ(-0.5deg);
      box-shadow: 0 0 45px rgba(0, 123, 167, 0.8);
    }
    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-bottom: 1px solid #3AB09E44;
    }
    .card .label {
      padding: 16px;
      font-size: 1rem;
      color: #ffffff;
      text-shadow: 0 0 5px #000;
      background: linear-gradient(to right, #111, #1a1a1a);
    }
    .variations {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 10px 0;
    }
    .variations img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 6px;
      border: 2px solid #3AB09E;
      cursor: pointer;
    }
    .view-full {
      margin: 10px 0 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background-color: #3AB09E;
      color: white;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 10px #3AB09E88;
      transition: transform 0.3s, box-shadow 0.3s;
      animation: neonPulse 2s infinite;
    }
    .view-full:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #3AB09Ecc;
    }
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(10, 10, 10, 0.95);
      z-index: 999;
      justify-content: center;
      align-items: center;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0, 123, 167, 0.5);
    }
    .close-btn {
      position: absolute;
      top: 30px;
      right: 40px;
      font-size: 3rem;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    .close-btn:hover {
      color: #3AB09E;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 1rem;
      color: #3AB09E;
      text-decoration: underline;
    }
    footer {
      margin-top: 60px;
      font-size: 0.9rem;
      color: #777;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      0% { opacity: 0; transform: translateY(60px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes neonPulse {
      0%, 100% { box-shadow: 0 0 12px #3AB09E; }
      50% { box-shadow: 0 0 28px #3AB09E; }
    }
  </style>
</head>

  <script>
    function openFullImage(button) {
      const img = button.closest('.card').querySelector('img');
      const src = img.getAttribute('src');
      document.getElementById('lightbox-img').setAttribute('src', src);
      document.getElementById('lightbox').style.display = 'flex';
    }

    function closeLightbox(event) {
      if (event) event.stopPropagation();
      document.getElementById('lightbox').style.display = 'none';
    }

    document.querySelectorAll('.variations img').forEach(img => {
      img.addEventListener('click', function() {
        const mainImg = this.closest('.card').querySelector('.main-img');
        mainImg.src = this.src;
        this.closest('.variations').querySelectorAll('img').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
